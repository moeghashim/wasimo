<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hand Tournament — Scan to Register</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .qr-stage {
        text-align: center;
        padding: 32px;
        max-width: 720px;
      }
      .qr-stage h1 {
        margin: 0 0 6px;
        font-size: clamp(28px, 5vw, 56px);
        color: var(--accent);
        letter-spacing: 0.02em;
      }
      .qr-stage .subtitle {
        margin: 0 0 28px;
        color: var(--muted);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: clamp(11px, 1.4vw, 14px);
      }
      .qr-card {
        background: #fff;
        padding: 20px;
        border-radius: 18px;
        display: inline-block;
        box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      }
      .qr-card img {
        display: block;
        width: clamp(220px, 50vmin, 520px);
        height: auto;
      }
      .cta {
        margin-top: 26px;
        font-size: clamp(20px, 3vw, 36px);
        font-weight: 700;
        color: var(--text);
      }
      .url {
        margin-top: 8px;
        color: var(--muted);
        font-size: clamp(13px, 1.6vw, 18px);
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main class="qr-stage">
      <h1>Hand Tournament</h1>
      <p class="subtitle">16 teams · Best of 3 round 1 · Knockout after</p>
      <div class="qr-card">
        <img src="assets/qr/signup.svg" alt="QR code to register your team" />
      </div>
      <p class="cta">Scan to register your team</p>
      <p class="url">moeghashim.github.io/wasimo</p>
    </main>
  </body>
</html>
